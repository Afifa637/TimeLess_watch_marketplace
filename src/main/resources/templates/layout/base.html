<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Timeless</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/timeless.css}">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-timeless sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold brand-mark" th:href="@{/}">⌚ TIMELESS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#timelessNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="timelessNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="!isAuthenticated() or hasRole('BUYER')">
                    <a class="nav-link" th:href="@{/watches}">Browse Watches</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BUYER')">
                    <a class="nav-link" th:href="@{/buyer/wishlist}">
                        Wishlist
                        <span class="badge text-bg-light ms-1" th:text="${wishlistCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BUYER')">
                    <a class="nav-link" th:href="@{/buyer/cart}">
                        Cart
                        <span class="badge text-bg-light ms-1" th:text="${cartCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BUYER')">
                    <a class="nav-link" th:href="@{/buyer/orders}">My Orders</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SELLER')">
                    <a class="nav-link" th:href="@{/seller/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SELLER')">
                    <a class="nav-link" th:href="@{/seller/watches/create}">List a Watch</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SELLER')">
                    <a class="nav-link" th:href="@{/seller/orders}">My Orders</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text" sec:authorize="isAuthenticated()">
                    Signed in as
                    <strong th:text="${currentUser != null ? currentUser.account.fullName : 'User'}">User</strong>
                </span>
                <span sec:authentication="name" class="d-none"></span>
                <a href="#" class="btn btn-sm btn-light" data-logout sec:authorize="isAuthenticated()">Logout</a>
            </div>
        </div>
    </div>
</nav>

<th:block th:fragment="footerScripts">
    <footer class="footer-timeless text-center">
        <div class="container">
            <p class="mb-1 fw-semibold">Timeless Luxury Watch Marketplace</p>
            <p class="mb-0 small">Curated resale. Trusted sellers. Elegant buying experience.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/timeless.js}"></script>
</th:block>
</body>
</html>
