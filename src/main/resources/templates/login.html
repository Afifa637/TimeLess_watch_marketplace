<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Login | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="auth-card auth-shell timeless-panel p-4 p-md-5">
        <div class="text-center mb-4">
            <p class="editorial-kicker mb-2">Member access</p>
            <h1 class="fw-bold">Welcome Back</h1>
            <p class="text-muted mb-0">Sign in to manage your Timeless account.</p>
        </div>
        <form id="loginForm" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input id="email" name="email" type="email" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button class="btn btn-timeless-primary w-100" type="submit">Login</button>
        </form>
        <p class="text-center text-muted mt-4 mb-0">New to Timeless? <a th:href="@{/register}">Create an account</a></p>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        const form = event.target;
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
        }
        try {
            await loginUser(form.email.value, form.password.value);
        } catch (error) {
            showToast(error.message, 'error');
        }
    });
</script>
</body>
</html>
