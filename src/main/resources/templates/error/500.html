<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Server Error | Timeless</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/timeless.css}">
</head>
<body>
<main class="container py-5 main-content d-flex align-items-center justify-content-center">
    <div class="timeless-panel p-5 text-center page-narrow">
        <span class="listing-kicker mb-3">Timeless</span>
        <h1 class="watches-title mb-2">500</h1>
        <h3 class="fw-bold mb-3">Something went wrong</h3>
        <p class="text-muted mb-4">An unexpected server error occurred. Please try again later.</p>
        <div class="d-flex justify-content-center gap-2 flex-wrap">
            <a th:href="@{/}" class="btn btn-timeless-primary">Go Home</a>
            <a th:href="@{/watches}" class="btn btn-timeless-outline">Browse Watches</a>
        </div>
    </div>
</main>
</body>
</html>
