<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('My Orders | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <section class="page-hero compact mb-4">
        <div class="mb-0">
            <span class="listing-kicker">Purchase archive</span>
            <h1 class="watches-title mb-1">My Orders</h1>
            <p class="text-muted mb-0">Track all your purchases in one place.</p>
        </div>
    </section>

    <div th:if="${orders.isEmpty()}" class="empty-state">
        <h4 class="fw-bold">No orders yet</h4>
        <p class="text-muted">Browse our collection and place your first order.</p>
        <a class="btn btn-timeless-primary" th:href="@{/watches}">Browse Watches</a>
    </div>

    <div th:if="${!orders.isEmpty()}" class="d-flex flex-column gap-3">
        <div th:each="order : ${orders}" class="timeless-panel p-4">
            <div class="row g-3 align-items-start">

                <div class="col-auto">
                    <a th:href="@{/buyer/orders/{id}(id=${order.id})}">
                        <img th:src="${order.watchImageUrl != null ? order.watchImageUrl : 'https://via.placeholder.com/100?text=⌚'}"
                             alt="watch" style="width:80px;height:80px;object-fit:cover;border-radius:16px;">
                    </a>
                </div>

                <div class="col">
                    <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
                        <div>
                            <p class="editorial-kicker mb-1">Order detail</p>
                            <a th:href="@{/buyer/orders/{id}(id=${order.id})}" class="fw-bold text-decoration-none"
                               th:text="${order.watchName}">Watch Name</a>
                        </div>
                        <span class="badge-status" th:classappend="${' ' + order.status}" th:text="${order.status}">STATUS</span>
                    </div>

                    <div class="text-muted small mb-2" th:text="${order.watchBrand + ' • Qty: ' + order.quantity}">Brand • Qty</div>

                    <div class="mini-timeline mb-3"
                         th:with="cancelled=${order.status == 'CANCELLED'},
                        cur=${order.status == 'PENDING' ? 0 : order.status == 'CONFIRMED' ? 1 : order.status == 'PROCESSING' ? 2 : order.status == 'SHIPPED' ? 3 : order.status == 'DELIVERED' ? 4 : order.status == 'COMPLETED' ? 5 : -1}">

                        <div th:if="${cancelled}" class="mini-cancelled">✕ Cancelled</div>

                        <div th:if="${!cancelled}" class="d-flex align-items-center gap-0">
                            <div th:each="step, stat : ${ {'P','C','Pr','Sh','D','✓'} }"
                                 class="d-flex align-items-center">
                                <div class="mini-dot" th:classappend="${stat.index <= cur} ? ' done' : ''"
                                     th:title="${stat.index == 0 ? 'Pending' : stat.index == 1 ? 'Confirmed' : stat.index == 2 ? 'Processing' : stat.index == 3 ? 'Shipped' : stat.index == 4 ? 'Delivered' : 'Completed'}"
                                     th:text="${stat.index == cur ? '●' : (stat.index < cur ? '✓' : '○')}">○</div>
                                <div th:if="${!stat.last}" class="mini-line" th:classappend="${stat.index < cur} ? ' done' : ''"></div>
                            </div>
                        </div>

                    </div>

                    <div class="d-flex gap-3 flex-wrap align-items-center">
                        <span class="fw-bold price-text" style="font-size:1rem;"
                              th:text="${'৳' + #numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">৳0</span>
                        <span class="text-muted small"
                              th:text="${#temporals.format(order.createdAt,'dd MMM yyyy')}">Date</span>
                        <span th:if="${order.paymentMethod != null}" class="text-muted small"
                              th:text="${'via ' + order.paymentMethod}">via BKASH</span>
                        <a th:href="@{/buyer/orders/{id}(id=${order.id})}"
                           class="btn btn-sm btn-timeless-outline ms-auto">View Details →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
</body>
</html>
