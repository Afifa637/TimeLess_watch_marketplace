<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('My Wishlist | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="wishlist-header">
            <h1 class="fw-bold mb-1">My Wishlist</h1>
            <p class="text-muted mb-0">Keep track of watches you may want to purchase later.</p>
        </div>
    </div>

    <div th:if="${wishlistItems.isEmpty()}" class="empty-state">
        <h4 class="fw-bold">Nothing in your wishlist yet</h4>
        <p class="text-muted">Save standout pieces and revisit them anytime.</p>
        <a class="btn btn-timeless-primary" th:href="@{/watches}">Discover Watches</a>
    </div>

    <div th:if="${!wishlistItems.isEmpty()}" class="watch-grid">
        <div class="watch-card" th:each="item : ${wishlistItems}">
            <img class="watch-card-image" th:src="${item.watchImageUrl != null ? item.watchImageUrl : 'https://via.placeholder.com/800x600?text=Timeless'}" alt="Watch image">
            <div class="p-4">
                <h5 class="fw-bold mb-1" th:text="${item.watchName}">Watch</h5>
                <p class="text-muted mb-2" th:text="${item.watchBrand}">Brand</p>
                <span class="badge-status" th:classappend="${' ' + item.watchStatus}" th:text="${item.watchStatus}">ACTIVE</span>
                <div class="price-text mt-3 mb-3" th:text="${'৳' + #numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">$1,000.00</div>
                <div class="d-flex gap-2">
                    <button class="btn btn-classic flex-grow-1" th:onclick="|moveToCart(${item.watchId})|">Move to Cart</button>
                    <button class="btn btn-classic-outline" th:onclick="|removeFromWishlist(${item.watchId})|">Remove</button>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
</body>
</html>
