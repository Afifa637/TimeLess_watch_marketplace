<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Edit Listing | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="timeless-panel p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <div>
                        <h1 class="fw-bold mb-1">Edit Listing</h1>
                        <p class="text-muted mb-0">Seller updates send the listing back into admin review.</p>
                    </div>
                    <span class="badge-status" th:classappend="${' ' + watch.status}" th:text="${watch.status}">PENDING_REVIEW</span>
                </div>
                <form id="editWatchForm" class="needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required th:value="${watch.name}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select name="brand" class="form-select" required>
                                <option th:each="brand : ${brandOptions}" th:value="${brand}" th:text="${brand}" th:selected="${brand == watch.brand}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select" required>
                                <option th:each="category : ${categoryOptions}" th:value="${category}" th:text="${category}" th:selected="${category == watch.category}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Condition</label>
                            <select name="condition" class="form-select" required>
                                <option th:each="condition : ${conditionOptions}" th:value="${condition}" th:text="${condition}" th:selected="${condition == watch.condition}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Price</label>
                            <input type="number" min="1" step="0.01" name="price" class="form-control" required th:value="${watch.price}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stock Quantity</label>
                            <input type="number" min="0" step="1" name="stockQuantity" class="form-control" required th:value="${watch.stockQuantity}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Year</label>
                            <input type="number" min="1900" step="1" name="year" class="form-control" th:value="${watch.year}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Reference Number</label>
                            <input type="text" name="referenceNumber" class="form-control" th:value="${watch.referenceNumber}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Image URL</label>
                            <input type="url" name="imageUrl" class="form-control" th:value="${watch.imageUrl}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="6" th:text="${watch.description}"></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
                        <button class="btn btn-timeless-danger" type="button" th:onclick="|deleteWatch(${watch.id})|">Delete Watch</button>
                        <div class="d-flex gap-2">
                            <a class="btn btn-timeless-outline" th:href="@{/seller/dashboard}">Cancel</a>
                            <button class="btn btn-timeless-primary" type="submit">Save Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
<script>
    document.getElementById('editWatchForm').addEventListener('submit', function (event) {
        event.preventDefault();
        const form = event.target;
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            showToast('Please complete all required fields.', 'error');
            return;
        }
        updateWatchFromForm([[${watch.id}]], form);
    });
</script>
</body>
</html>
