<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Create Listing | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="timeless-panel p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <div>
                        <h1 class="fw-bold mb-1">List a New Watch</h1>
                        <p class="text-muted mb-0">Complete the form below. Your listing will be submitted for admin review.</p>
                    </div>
                    <a class="btn btn-timeless-outline" th:href="@{/seller/dashboard}">Back to Dashboard</a>
                </div>
                <form id="createWatchForm" class="needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select name="brand" class="form-select" required>
                                <option value="" selected disabled>Select brand</option>
                                <option th:each="brand : ${brandOptions}" th:value="${brand}" th:text="${brand}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="" selected disabled>Select category</option>
                                <option th:each="category : ${categoryOptions}" th:value="${category}" th:text="${category}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Condition</label>
                            <select name="condition" class="form-select" required>
                                <option value="" selected disabled>Select condition</option>
                                <option th:each="condition : ${conditionOptions}" th:value="${condition}" th:text="${condition}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Price</label>
                            <input type="number" min="1" step="0.01" name="price" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stock Quantity</label>
                            <input type="number" min="1" step="1" name="stockQuantity" class="form-control" value="1" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Year</label>
                            <input type="number" min="1900" step="1" name="year" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Reference Number</label>
                            <input type="text" name="referenceNumber" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Image URL</label>
                            <input type="url" name="imageUrl" class="form-control" placeholder="https://..."></input>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="6" placeholder="Describe the watch, condition notes, included accessories, and service history."></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a class="btn btn-timeless-outline" th:href="@{/seller/dashboard}">Cancel</a>
                        <button class="btn btn-timeless-primary" type="submit">Submit Listing</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
<script>
    document.getElementById('createWatchForm').addEventListener('submit', function (event) {
        event.preventDefault();
        const form = event.target;
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            showToast('Please complete all required fields.', 'error');
            return;
        }
        createWatchFromForm(form);
    });
</script>
</body>
</html>
