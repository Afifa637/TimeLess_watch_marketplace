<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Manage Orders | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold mb-1">Order Management</h1>
            <p class="text-muted mb-0">View all order activity across the marketplace.</p>
        </div>
    </div>

    <div class="timeless-panel p-3 p-lg-4">
        <div class="table-responsive">
            <table class="table-timeless">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Buyer</th>
                    <th>Watch</th>
                    <th>Seller</th>
                    <th>Status</th>
                    <th>Amount</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="${order.buyerName}">Buyer</td>
                    <td th:text="${order.watchName}">Watch</td>
                    <td th:text="${order.sellerName}">Seller</td>
                    <td>
                        <span class="badge-status"
                              th:classappend="${' ' + order.status}"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td th:text="${'৳' + #numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">01 Jan 2025</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
</body>
</html>
