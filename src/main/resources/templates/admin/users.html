<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Manage Users | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="fw-bold mb-1">User Management</h1>
            <p class="text-muted mb-0">Review marketplace accounts and enable or disable access.</p>
        </div>
        <form method="get" th:action="@{/admin/users}" class="d-flex gap-2">
            <select class="form-select" name="role">
                <option value="" th:selected="${selectedRole == ''}">All Roles</option>
                <option value="ADMIN" th:selected="${selectedRole == 'ADMIN'}">Admin</option>
                <option value="SELLER" th:selected="${selectedRole == 'SELLER'}">Seller</option>
                <option value="BUYER" th:selected="${selectedRole == 'BUYER'}">Buyer</option>
            </select>
            <button class="btn btn-timeless-primary" type="submit">Filter</button>
        </form>
    </div>

    <div class="timeless-panel p-3 p-lg-4">
        <div class="table-responsive">
            <table class="table-timeless">
                <thead>
                <tr><th>ID</th><th>Email</th><th>Full Name</th><th>Role</th><th>Enabled</th><th>Created At</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.email}">email</td>
                    <td th:text="${user.fullName}">Name</td>
                    <td><span class="role-badge" th:classappend="${' ' + user.role}" th:text="${user.role}">BUYER</span></td>
                    <td>
                        <span class="badge-status" th:classappend="${user.enabled ? ' ACTIVE' : ' CANCELLED'}" th:text="${user.enabled ? 'ENABLED' : 'DISABLED'}">ENABLED</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">01 Jan 2025</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-timeless-outline" th:onclick="|toggleUser(${user.id})|" th:text="${user.enabled ? 'Disable' : 'Enable'}">Toggle</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
</body>
</html>
