<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Manage Listings | Timeless')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<main class="container py-5 main-content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="fw-bold mb-1">Listing Management</h1>
            <p class="text-muted mb-0">Approve, reject, deactivate, or remove marketplace listings.</p>
        </div>
        <div class="nav nav-pills gap-2">
            <a class="btn" th:classappend="${selectedStatus == 'ALL'} ? ' btn-timeless-primary' : ' btn-timeless-outline'" th:href="@{/admin/listings(status='ALL')}">All</a>
            <a class="btn" th:classappend="${selectedStatus == 'PENDING_REVIEW'} ? ' btn-timeless-primary' : ' btn-timeless-outline'" th:href="@{/admin/listings(status='PENDING_REVIEW')}">Pending Review</a>
            <a class="btn" th:classappend="${selectedStatus == 'ACTIVE'} ? ' btn-timeless-primary' : ' btn-timeless-outline'" th:href="@{/admin/listings(status='ACTIVE')}">Active</a>
            <a class="btn" th:classappend="${selectedStatus == 'INACTIVE'} ? ' btn-timeless-primary' : ' btn-timeless-outline'" th:href="@{/admin/listings(status='INACTIVE')}">Inactive</a>
            <a class="btn" th:classappend="${selectedStatus == 'REJECTED'} ? ' btn-timeless-primary' : ' btn-timeless-outline'" th:href="@{/admin/listings(status='REJECTED')}">Rejected</a>
        </div>
    </div>

    <div class="timeless-panel p-3 p-lg-4">
        <div class="table-responsive">
            <table class="table-timeless">
                <thead>
                <tr><th>ID</th><th>Image</th><th>Name</th><th>Brand</th><th>Seller</th><th>Price</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="listing : ${listings}">
                    <td th:text="${listing.id}">1</td>
                    <td><img class="table-thumb" th:src="${listing.imageUrl != null ? listing.imageUrl : 'https://via.placeholder.com/150?text=Timeless'}" alt="Watch image"></td>
                    <td th:text="${listing.name}">Watch</td>
                    <td th:text="${listing.brand}">Brand</td>
                    <td th:text="${listing.sellerName}">Seller</td>
                    <td th:text="${'৳' + #numbers.formatDecimal(listing.price, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td><span class="badge-status" th:classappend="${' ' + listing.status}" th:text="${listing.status}">PENDING_REVIEW</span></td>
                    <td>
                        <div class="d-flex gap-2 flex-wrap">
                            <button class="btn btn-sm btn-timeless-primary" th:if="${listing.status == 'PENDING_REVIEW' or listing.status == 'INACTIVE' or listing.status == 'REJECTED'}" th:onclick="|approveWatch(${listing.id})|">Approve</button>
                            <button class="btn btn-sm btn-timeless-danger" th:if="${listing.status == 'PENDING_REVIEW'}" th:onclick="|rejectWatch(${listing.id})|">Reject</button>
                            <button class="btn btn-sm btn-timeless-outline" th:if="${listing.status == 'ACTIVE'}" th:onclick="|deactivateWatch(${listing.id})|">Deactivate</button>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="|deleteWatch(${listing.id})|">Delete</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{layout/base :: footerScripts}"></div>
</body>
</html>
