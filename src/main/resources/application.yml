server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    whitelabel:
      enabled: false

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  upload-dir: uploads
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRY}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:${APP_BOOTSTRAP_ENABLED:true}}
  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs